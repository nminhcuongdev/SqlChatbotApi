services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sqlchatbot-api
    env_file:
      - .env.docker
    environment:
      MSSQL_HOST: sqlserver
      MSSQL_PORT: "1433"
      MSSQL_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong@Passw0rd123}
      MSSQL_SQLALCHEMY_DRIVER: pymssql
      MSSQL_WINDOWS_AUTH: "false"
      MSSQL_TRUST_SERVER_CERTIFICATE: "true"
      CHROMA_PERSIST_DIR: /app/chroma_db
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_db
    networks:
      - stockdemo-network
    restart: unless-stopped


volumes:
  chroma_data:

networks:
  stockdemo-network:
    external: true
    name: stockdemoapi_stockdemo-network
